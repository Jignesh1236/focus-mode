<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Varela Round', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #18181b;
      color: #fff;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 6px 0;
    }
    p.hint {
      font-size: 12px;
      opacity: 0.7;
      margin: 0 0 16px 0;
    }
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    #channelInput {
      flex: 1;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    #addBtn {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      background: #3ea6ff;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
    }
    #emptyNote {
      font-size: 13px;
      opacity: 0.6;
    }
    #channelList {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .channel-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 8px;
      font-size: 14px;
      word-break: break-word;
    }
    .remove-btn {
      border: none;
      background: rgba(255,80,80,0.85);
      color: #fff;
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      margin-left: 10px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <h1>Whitelisted Channels</h1>
  <p class="hint">Leave empty to allow all channels. If filled, only these channels can play.</p>
  <div class="input-row">
    <input id="channelInput" type="text" placeholder="@channelname or channel URL">
    <button id="addBtn">Add</button>
  </div>
  <p id="emptyNote">No channels whitelisted yet.</p>
  <ul id="channelList"></ul>
  <script src="whitelist.js"></script>
</body>
</html>

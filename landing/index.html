<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driftless</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden;
            overflow-y: auto;
        }
        main {
            width: 100%;
        }
        .bg-layer1 {
            width: 100%;
            height: 100vh;
            position: relative;
        }
        .bg-layer1 video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .overlay-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.4;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <main>
        <div class="bg-layer1">
            <video id="bg-video" autoplay loop muted></video>
            <video class="overlay-video" src="public/overlay.mp4" autoplay loop muted></video>
        </div>
        
    </main>
    <script>
        const video = document.getElementById('bg-video');
        const videoSrc = 'public/m3u8/master.m3u8';
        
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
        }
    </script>
    
</body>
</html>
